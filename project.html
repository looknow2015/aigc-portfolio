<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>案例详情 | 个人作品集</title>
    <meta name="description" content="作品集案例详情页，展示项目背景、设计职责、视觉过程与成果图片。" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="project-page">
    <div class="grain" aria-hidden="true"></div>

    <header class="site-header">
      <a class="brand" href="index.html#home" aria-label="回到首页">
        <span class="brand-mark">设</span>
        <span>你的名字 / Studio</span>
      </a>
      <nav class="desktop-nav" aria-label="主导航">
        <a href="index.html#work">作品</a>
        <a href="index.html#about">关于</a>
        <a href="index.html#contact">联系</a>
      </nav>
      <a class="back-link" href="index.html#work">返回作品</a>
    </header>

    <main data-project-detail>
      <section class="project-hero">
        <div class="project-hero-copy">
          <p class="eyebrow" data-project-category></p>
          <h1 data-project-title></h1>
          <p class="project-lead" data-project-description></p>
        </div>
        <figure class="project-cover">
          <img data-project-cover alt="" />
        </figure>
      </section>

      <section class="project-meta" aria-label="项目信息">
        <div>
          <span>年份</span>
          <strong data-project-year></strong>
        </div>
        <div>
          <span>职责</span>
          <strong data-project-role></strong>
        </div>
        <div>
          <span>客户</span>
          <strong data-project-client></strong>
        </div>
      </section>

      <section class="project-story">
        <div>
          <p class="eyebrow">项目思路 / Concept</p>
          <p data-project-concept></p>
        </div>
        <div>
          <p class="eyebrow">设计结果 / Outcome</p>
          <p data-project-outcome></p>
        </div>
      </section>

      <section class="project-video" aria-label="案例视频" data-project-video-section hidden>
        <div class="section-heading video-heading">
          <p class="eyebrow">视频展示 / Video</p>
          <h2 data-project-video-title>项目视频</h2>
        </div>
        <video data-project-video controls playsinline preload="metadata"></video>
      </section>

      <section class="project-gallery" aria-label="案例图片" data-project-gallery></section>

      <nav class="project-nav" aria-label="案例切换">
        <a data-prev-project href="#">上一个案例</a>
        <a href="index.html#work">全部作品</a>
        <a data-next-project href="#">下一个案例</a>
      </nav>
    </main>

    <script src="projects-data.js"></script>
    <script src="project.js"></script>
  </body>
</html>
